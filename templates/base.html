<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}Jordan{% endblock %} — {{ client.business_name if client else 'Jordan' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  {{ theme.primary  | default('#25D366') }};
      --bg:       {{ theme.bg       | default('#07070e') }};
      --card-bg:  {{ theme.card_bg  | default('#0f1a14') }};
      --border:   {{ theme.border   | default('#1a3020') }};
      --text:     #dde;
      --muted:    #666;
      --red:      #ef4444;
      --warn:     #f59e0b;
      --green:    var(--primary);
    }
    {% block base_styles %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
