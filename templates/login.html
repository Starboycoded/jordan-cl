<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Jordan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07070e;--s:#10101a;--b:#1c1c2a;--g:#25D366;--text:#dde;--m:#666;--red:#ef4444}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--s);border:1px solid var(--b);border-radius:18px;padding:32px 28px;width:100%;max-width:380px}
    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{font-size:40px;margin-bottom:8px}
    .logo h1{font-size:22px;font-weight:700;color:#fff}
    .logo p{font-size:12px;color:var(--m);margin-top:4px}
    .field{margin-bottom:16px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:6px}
    .inp{width:100%;background:#0b0b15;border:1px solid var(--b);border-radius:10px;color:var(--text);padding:12px 14px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .inp:focus{border-color:var(--g)}
    .btn{width:100%;background:var(--g);color:#000;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:4px}
    .btn:hover{opacity:.85}
    .error{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px}
    .hint{font-size:11px;color:var(--m);margin-top:20px;text-align:center;line-height:1.6}
    .hint a{color:var(--g);text-decoration:none}
    .divider{border:none;border-top:1px solid var(--b);margin:20px 0}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Jordan</h1>
    <p>WhatsApp Commerce OS — CodedLabs</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Store ID</label>
      <input type="text" name="slug" class="inp"
             placeholder="e.g. tech_squad"
             value="{{ request.form.get('slug', '') }}"
             autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Secret Key</label>
      <input type="password" name="secret" class="inp"
             placeholder="Your dashboard secret"
             autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>

  <hr class="divider">
  <p class="hint">
    New business? <a href="/onboard">Set up your store →</a><br>
    CodedLabs admin? Leave Store ID empty.
  </p>
</div>
</body>
</html>
